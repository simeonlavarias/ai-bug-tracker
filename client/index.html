<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Bug Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div>
        <h1 class="header-title">AI Bug Tracker</h1>
        <p class="header-sub">Track AI failures and analyze quality trends</p>
      </div>
      <nav class="nav">
        <button class="nav-btn active" onclick="showTab('dashboard')">Dashboard</button>
        <button class="nav-btn" onclick="showTab('log')">Log Case</button>
        <button class="nav-btn" onclick="showTab('history')">History</button>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">

    <!-- DASHBOARD TAB -->
    <div id="tab-dashboard" class="tab active">
      <div id="stats-cards" class="stats-grid"></div>
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">Recent Test Cases</h2>
          <button class="link-btn" onclick="showTab('history')">View all →</button>
        </div>
        <div id="recent-table"></div>
      </div>
    </div>

    <!-- LOG TAB -->
    <div id="tab-log" class="tab">
      <h2 class="section-title" style="margin-bottom:1.5rem">Log New Test Case</h2>
      <div class="card form-card">
        <div id="form-success" class="alert alert-success" style="display:none">
          Test case saved successfully!
        </div>
        <div id="form-error" class="alert alert-error" style="display:none"></div>

        <div class="form-group">
          <label class="label">Prompt *</label>
          <textarea id="f-prompt" class="input" rows="3" placeholder="Enter the prompt given to the AI model…"></textarea>
          <span class="field-error" id="err-prompt"></span>
        </div>

        <div class="form-group">
          <label class="label">AI Response *</label>
          <textarea id="f-response" class="input" rows="3" placeholder="Paste the problematic AI response here…"></textarea>
          <span class="field-error" id="err-response"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="label">Category</label>
            <select id="f-category" class="input">
              <option>General</option>
              <option>Summarization</option>
              <option>Creative Writing</option>
              <option>Code Generation</option>
              <option>Reasoning</option>
              <option>Translation</option>
              <option>Knowledge Query</option>
            </select>
          </div>
          <div class="form-group">
            <label class="label">Bug Type</label>
            <select id="f-bugtype" class="input">
              <option>Hallucination</option>
              <option>Incorrect Facts</option>
              <option>Logic Error</option>
              <option>Formatting Issue</option>
              <option>Incomplete Answer</option>
              <option>Unsafe Output</option>
              <option>Code Error</option>
              <option>Irrelevant Response</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="label">Severity</label>
            <select id="f-severity" class="input">
              <option>Low</option>
              <option selected>Medium</option>
              <option>High</option>
              <option>Critical</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="label">Rating</label>
          <div class="pill-group" id="rating-group">
            <button class="pill" onclick="selectRating(this)" data-value="Correct">Correct</button>
            <button class="pill" onclick="selectRating(this)" data-value="Partially Correct">Partially Correct</button>
            <button class="pill active" onclick="selectRating(this)" data-value="Incorrect">Incorrect</button>
          </div>
        </div>

        <div class="form-group">
          <label class="label">Edge Case Tags</label>
          <div class="pill-group">
            <button class="pill tag-pill" onclick="toggleTag(this)">Ambiguous Prompt</button>
            <button class="pill tag-pill" onclick="toggleTag(this)">Adversarial Prompt</button>
            <button class="pill tag-pill" onclick="toggleTag(this)">Long Context</button>
            <button class="pill tag-pill" onclick="toggleTag(this)">Complex Reasoning</button>
            <button class="pill tag-pill" onclick="toggleTag(this)">Code Generation</button>
            <button class="pill tag-pill" onclick="toggleTag(this)">Sensitive Topic</button>
          </div>
        </div>

        <div class="form-group">
          <label class="label">Notes <span class="optional">optional</span></label>
          <textarea id="f-notes" class="input" rows="2" placeholder="Additional observations or context…"></textarea>
        </div>

        <button class="btn-primary" onclick="submitForm()">Save Test Case</button>
      </div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" class="tab">
      <h2 class="section-title" style="margin-bottom:1rem">Test Case History</h2>
      <div class="filters">
        <input id="search" class="input search-input" placeholder="Search prompts, responses, notes…" oninput="renderHistory()" />
        <select id="filter-bug" class="input filter-select" onchange="renderHistory()">
          <option value="">All Bug Types</option>
          <option>Hallucination</option>
          <option>Incorrect Facts</option>
          <option>Logic Error</option>
          <option>Formatting Issue</option>
          <option>Incomplete Answer</option>
          <option>Unsafe Output</option>
          <option>Code Error</option>
          <option>Irrelevant Response</option>
          <option>Other</option>
        </select>
        <select id="filter-sev" class="input filter-select" onchange="renderHistory()">
          <option value="">All Severities</option>
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
          <option>Critical</option>
        </select>
        <select id="filter-cat" class="input filter-select" onchange="renderHistory()">
          <option value="">All Categories</option>
          <option>General</option>
          <option>Summarization</option>
          <option>Creative Writing</option>
          <option>Code Generation</option>
          <option>Reasoning</option>
          <option>Translation</option>
          <option>Knowledge Query</option>
        </select>
      </div>
      <p id="history-count" class="count-label"></p>
      <div id="history-table"></div>
    </div>

  </main>

  <!-- DETAIL MODAL -->
  <div id="modal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span id="modal-id" class="modal-id"></span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
